name: goodmap
description: >-
  Beautiful, theme-aware Flutter map components — a native MapLibre flat map and
  a 3D globe with points, labels and animated great-circle arcs. Inspired by mapcn.
version: 0.3.0
repository: https://github.com/IldySilva/goodmap
homepage: https://github.com/IldySilva/goodmap
issue_tracker: https://github.com/IldySilva/goodmap/issues

topics:
  - map
  - maps
  - globe
  - maplibre
  - geo

screenshots:
  - description: "GoodMap — a flat map and a 3D globe for Flutter."
    path: screenshots/docbanner.jpg
  - description: "3D globe with great-circle arcs (iOS)."
    path: screenshots/picglobe.png
  - description: "Themed flat map with markers (iOS)."
    path: screenshots/pic2map.png

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  maplibre_gl: ^0.26.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  shaders:
    - shaders/sphere.frag
