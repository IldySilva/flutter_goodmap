name: mapcn_flutter
description: Theme-aware, ready-to-use Flutter map components built on maplibre_gl.
version: 0.1.0
repository: https://github.com/ildysilva/mapcn_flutter

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  maplibre_gl: ^0.26.1
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  shaders:
    - shaders/sphere.frag
